<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PaperStore</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { overflow-x: hidden; }
    body { font-family: system-ui, sans-serif; max-width: 800px; margin: 0 auto; padding: 0 1rem; color: #222; background: #f1f5f9; }
    html { background: #f1f5f9; }
    .site-banner { position: relative; width: 100vw; left: 50%; transform: translateX(-50%); line-height: 0; margin-bottom: 2rem; height: 120px; overflow: hidden; background-color: #fdfdfb; }
    .site-banner img { height: 120px; width: auto; max-width: none; display: block; }
    .banner-search { position: absolute; top: 50%; left: max(250px, calc(50% - 400px + 1rem)); right: calc(50% - 400px + 1rem); transform: translateY(-50%); display: flex; align-items: center; gap: 0.5rem; background: rgba(255,255,255,0.25); backdrop-filter: blur(12px) saturate(180%); -webkit-backdrop-filter: blur(12px) saturate(180%); border: 1px solid rgba(255,255,255,0.5); border-radius: 999px; padding: 0.4rem 0.6rem 0.4rem 1rem; box-shadow: 0 2px 12px rgba(0,0,0,0.1), inset 0 1px 0 rgba(255,255,255,0.6); }
    .banner-search input { background: none; border: none; outline: none; font-size: 0.9rem; color: #222; flex: 1; min-width: 0; }
    .banner-search input::placeholder { color: rgba(60,60,60,0.6); }
    .banner-search-btn { background: rgba(255,255,255,0.3); border: 1px solid rgba(255,255,255,0.5); border-radius: 999px; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px); box-shadow: inset 0 1px 0 rgba(255,255,255,0.5); }
    .banner-search-btn:hover { background: rgba(255,255,255,0.5); }
    .banner-search-btn svg { opacity: 0.6; display: block; }
    @media (max-width: 800px) {
      body { max-width: 100%; }
      .site-banner { margin-bottom: 3rem; overflow: visible; }
      .banner-search { position: fixed; top: 120px; left: 1rem; width: calc(100vw - 2rem); right: auto; transform: none; background: rgba(240,240,240,0.92); backdrop-filter: blur(12px) saturate(180%); -webkit-backdrop-filter: blur(12px) saturate(180%); z-index: 10; }
    }
    .add-toggle { position: fixed; bottom: 2rem; right: 2rem; width: 56px; height: 56px; border-radius: 50%; border: 2px solid #1e293b; cursor: pointer; font-size: 1.6rem; line-height: 1; display: flex; align-items: center; justify-content: center; z-index: 100; background: #fff; box-shadow: 0 4px 16px rgba(0,0,0,0.12); color: #1e293b; }
    .add-toggle:hover { background: #f8fafc; box-shadow: 0 6px 20px rgba(0,0,0,0.16); }
    .add-form { display: flex; gap: 0.5rem; margin-bottom: 0.75rem; }
    .add-form[hidden] { display: none; }
    .add-form input { flex: 1; padding: 0.5rem 0.75rem; border: 1px solid #ccc; border-radius: 4px; font-size: 1rem; }
    .add-form button { padding: 0.5rem 1rem; background: #2563eb; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 1rem; }
    .add-form button:disabled { opacity: 0.6; cursor: not-allowed; }
    #add-status { margin-bottom: 1rem; font-size: 0.9rem; min-height: 1.2em; }
    #add-status.error { color: #dc2626; }
    #add-status.success { color: #16a34a; }
    .list-controls { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.75rem; }
    #paper-count { font-size: 0.85rem; color: #666; flex: 1; }
    #sort-select { font-size: 0.85rem; padding: 0.25rem 0.5rem; border: 1px solid #ccc; border-radius: 4px; color: #444; }
    .paper-list { list-style: none; display: flex; flex-direction: column; gap: 0.75rem; }
    .paper-item { padding: 1rem 1.25rem; background: #fff; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.08), 0 2px 10px rgba(0,0,0,0.05); cursor: pointer; border: none; }
    .paper-item:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.12), 0 4px 16px rgba(0,0,0,0.08); }
    .paper-title { font-weight: 700; font-size: 1rem; color: #0f172a; line-height: 1.4; }
    .paper-meta { font-size: 0.82rem; color: #64748b; margin-top: 0.35rem; }
    .tag-filter { display: flex; align-items: center; gap: 0.4rem; margin-bottom: 0.75rem; }
    .tag-pills-row { display: flex; gap: 0.4rem; overflow: hidden; flex-shrink: 1; min-width: 0; }
    .tag-pill { padding: 0.3rem 0.85rem; border: none; border-radius: 999px; background: #94a3b8; font-size: 0.82rem; cursor: pointer; color: #fff; user-select: none; white-space: nowrap; flex-shrink: 0; font-weight: 500; }
    .tag-pill:hover { background: #7c8fa3; }
    .tag-pill.active { background: #1e293b; color: #fff; }
    .tag-autocomplete-wrap { position: relative; flex-shrink: 0; }
    .tag-autocomplete-wrap input { padding: 0.2rem 0.6rem; border: 1px solid #ccc; border-radius: 999px; font-size: 0.78rem; color: #444; width: 130px; outline: none; background: #f3f4f6; }
    .tag-autocomplete-wrap input:focus { border-color: #2563eb; background: #fff; }
    .tag-autocomplete-wrap input.active { background: #2563eb; color: #fff; border-color: #2563eb; }
    .tag-autocomplete-wrap input.active::placeholder { color: rgba(255,255,255,0.8); }
    .tag-dropdown { position: absolute; top: calc(100% + 2px); left: 0; background: #fff; border: 1px solid #ccc; border-radius: 6px; max-height: 200px; overflow-y: auto; z-index: 20; min-width: 160px; box-shadow: 0 2px 8px rgba(0,0,0,0.12); }
    .tag-dropdown div { padding: 0.3rem 0.65rem; font-size: 0.82rem; cursor: pointer; white-space: nowrap; }
    .tag-dropdown div:hover, .tag-dropdown div.highlighted { background: #eff6ff; }
    .tag-dropdown div.active { color: #2563eb; font-weight: 600; }
    .paper-tags { display: flex; flex-wrap: wrap; gap: 0.3rem; margin-top: 0.5rem; }
    .tag-chip { padding: 0.2rem 0.6rem; border-radius: 999px; background: #e2e8f0; color: #475569; font-size: 0.73rem; cursor: pointer; font-weight: 500; }
    .no-results { color: #999; font-style: italic; margin-top: 1rem; }
    .pagination { display: flex; align-items: center; justify-content: center; gap: 1rem; margin-top: 1.25rem; }
    .pagination button { padding: 0.35rem 0.9rem; border: 1px solid #ccc; border-radius: 4px; background: #fff; cursor: pointer; font-size: 0.9rem; }
    .pagination button:disabled { opacity: 0.4; cursor: not-allowed; }
    #page-info { font-size: 0.85rem; color: #555; }
    #enrich-status { font-size: 0.85rem; color: #555; }
    #enrich-status.error { color: #dc2626; }
    #enrich-status.running { color: #d97706; }
    .hamburger-btn { position: absolute; top: 50%; right: 1rem; transform: translateY(-50%); background: rgba(255,255,255,0.25); backdrop-filter: blur(12px) saturate(180%); -webkit-backdrop-filter: blur(12px) saturate(180%); border: 1px solid rgba(255,255,255,0.5); border-radius: 8px; width: 36px; height: 36px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.1); padding: 0; z-index: 50; }
    .hamburger-btn:hover { background: rgba(255,255,255,0.45); }
    .hamburger-btn span { display: block; width: 16px; height: 2px; background: #333; border-radius: 2px; }
    .hamburger-menu { position: fixed; background: #fff; border: 1px solid #e2e8f0; border-radius: 10px; box-shadow: 0 4px 20px rgba(0,0,0,0.12); min-width: 220px; z-index: 200; overflow: hidden; }
    .hamburger-menu[hidden] { display: none; }
    .menu-item { display: flex; align-items: center; gap: 0.65rem; width: 100%; padding: 0.7rem 1rem; background: none; border: none; font-size: 0.88rem; color: #1e293b; cursor: pointer; text-align: left; text-decoration: none; }
    .menu-item:hover { background: #f8fafc; }
    .menu-item.active { color: #b45309; }
    .menu-item svg { flex-shrink: 0; opacity: 0.6; }
    .menu-divider { height: 1px; background: #e2e8f0; margin: 0.25rem 0; }
    .menu-enrich-status { font-size: 0.78rem; color: #888; padding: 0 1rem 0.5rem; }
  </style>
</head>
<body>
  <div class="site-banner">
    <img src="/static/banner-teleosis.png" alt="Teleosis.ai" />
    <div class="banner-search">
      <input id="search-input" type="search" placeholder="Search" autocomplete="off" />
      <button class="banner-search-btn" id="banner-search-btn" aria-label="Search">
        <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>
    </div>
    <button class="hamburger-btn" id="hamburger-btn" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </div>
  <div class="hamburger-menu" id="hamburger-menu" hidden>
    <button class="menu-item" id="enrich-btn">
      <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="M11 8v6M8 11h6"/></svg>
      <span id="enrich-btn-label">Find missing metadata</span>
    </button>
    <div class="menu-enrich-status" id="enrich-status"></div>
    <div class="menu-divider"></div>
    <a class="menu-item" href="/tags.html">
      <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
      Manage tags
    </a>
    <div class="menu-divider"></div>
    <a class="menu-item" href="/extension/download" download>
      <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Download Chrome extension
    </a>
  </div>
  <button class="add-toggle" id="add-toggle" aria-label="Add paper">
    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
  </button>
  <form class="add-form" id="add-form" hidden>
    <input type="url" id="url-input" placeholder="Paste an arXiv URL or PDF URL…" required />
    <button type="submit" id="add-btn">Add</button>
  </form>
  <div id="add-status"></div>

  <div class="list-controls">
    <div id="paper-count"></div>
    <label for="sort-select" style="font-size:0.85rem;color:#666;">Sort:</label>
    <select id="sort-select">
      <option value="added_at">Date Added</option>
      <option value="title">Title</option>
      <option value="published_date">Date Published</option>
    </select>
  </div>

  <div class="tag-filter" id="tag-filter" hidden>
    <div class="tag-pills-row" id="tag-pills-row"></div>
    <div class="tag-autocomplete-wrap" id="tag-autocomplete-wrap">
      <input type="text" id="tag-autocomplete" placeholder="More tags…" autocomplete="off" />
      <div class="tag-dropdown" id="tag-dropdown" hidden></div>
    </div>
  </div>

  <ul class="paper-list" id="paper-list"></ul>

  <div class="pagination" id="pagination" hidden>
    <button id="prev-btn">&larr; Prev</button>
    <span id="page-info"></span>
    <button id="next-btn">Next &rarr;</button>
  </div>

  <script src="/static/utils.js?v=2"></script>
  <script src="/static/index.js?v=2"></script>
  <script>
    const hamburgerBtn = document.getElementById('hamburger-btn');
    const hamburgerMenu = document.getElementById('hamburger-menu');
    hamburgerBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      if (hamburgerMenu.hidden) {
        const rect = hamburgerBtn.getBoundingClientRect();
        hamburgerMenu.style.top = (rect.bottom + 6) + 'px';
        hamburgerMenu.style.right = (window.innerWidth - rect.right) + 'px';
      }
      hamburgerMenu.hidden = !hamburgerMenu.hidden;
    });
    document.addEventListener('click', () => { hamburgerMenu.hidden = true; });
    hamburgerMenu.addEventListener('click', (e) => e.stopPropagation());
  </script>
</body>
</html>
