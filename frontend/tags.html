<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tags — PaperStore</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { overflow-x: hidden; background: #f1f5f9; }
    body { font-family: system-ui, sans-serif; max-width: 800px; margin: 0 auto; padding: 0 1rem; color: #222; background: #f1f5f9; }
    .site-banner { position: relative; width: 100vw; left: 50%; transform: translateX(-50%); line-height: 0; margin-bottom: 2rem; height: 120px; overflow: hidden; background-color: #fdfdfb; }
    .site-banner img { height: 120px; width: auto; max-width: none; display: block; }
    .back-btn { position: absolute; top: 50%; left: 1rem; transform: translateY(-50%); background: rgba(255,255,255,0.25); backdrop-filter: blur(12px) saturate(180%); -webkit-backdrop-filter: blur(12px) saturate(180%); border: 1px solid rgba(255,255,255,0.5); border-radius: 8px; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.1); text-decoration: none; color: #333; z-index: 50; }
    .back-btn:hover { background: rgba(255,255,255,0.45); }
    @media (max-width: 800px) { body { max-width: 100%; } }
    h1 { font-size: 1.25rem; font-weight: 700; color: #0f172a; margin-bottom: 1.25rem; }
    .controls { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1rem; }
    .controls label { font-size: 0.85rem; color: #666; }
    #sort-select { font-size: 0.85rem; padding: 0.25rem 0.5rem; border: 1px solid #ccc; border-radius: 4px; color: #444; }
    #tag-count { font-size: 0.85rem; color: #666; flex: 1; }
    .tag-list { list-style: none; display: flex; flex-direction: column; gap: 0.5rem; }
    .tag-row { display: flex; align-items: center; padding: 0.65rem 1rem; background: #fff; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.08), 0 2px 10px rgba(0,0,0,0.05); gap: 0.75rem; }
    .tag-name { flex: 1; font-size: 0.95rem; font-weight: 500; color: #0f172a; }
    .tag-count { font-size: 0.82rem; color: #64748b; min-width: 5rem; text-align: right; }
    .tag-bar-wrap { width: 120px; height: 6px; background: #e2e8f0; border-radius: 3px; overflow: hidden; flex-shrink: 0; }
    .tag-bar { height: 100%; background: #94a3b8; border-radius: 3px; transition: width 0.2s; }
    .delete-btn { opacity: 0; background: none; border: none; cursor: pointer; color: #94a3b8; padding: 0.2rem; border-radius: 4px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: opacity 0.15s, color 0.15s; }
    .tag-row:hover .delete-btn { opacity: 1; }
    .delete-btn:hover { color: #dc2626; }
    .tag-row.deleting { opacity: 0.4; pointer-events: none; }
    #empty-msg { color: #999; font-style: italic; margin-top: 1rem; }
  </style>
</head>
<body>
  <div class="site-banner">
    <img src="/static/banner-teleosis.png" alt="Teleosis.ai" />
    <a class="back-btn" href="/" aria-label="Back to library">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </a>
  </div>

  <div class="controls">
    <h1>Tags</h1>
    <span id="tag-count"></span>
    <label for="sort-select">Sort:</label>
    <select id="sort-select">
      <option value="alpha">A–Z</option>
      <option value="count">Count</option>
    </select>
  </div>

  <ul class="tag-list" id="tag-list"></ul>
  <p id="empty-msg" hidden>No tags yet.</p>

  <script src="/static/utils.js?v=2"></script>
  <script src="/static/tags.js?v=1"></script>
</body>
</html>
